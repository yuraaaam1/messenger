<!DOCTYPE html>
<html lang = "ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BackRooms</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="auth-screen">
        <h1>BackRooms</h1>
        <p class="subtitle">Закулисье</p>

        <div id="create-form">
            <h2>Создать комнату</h2>
            <input type="text" id="create-room-name" placeholder="Название комнаты"/>
            <input type="password" id="create-room-key" placeholder="Придумайте секретный ключ"/>
            <button id="create-btn">Создать</button>
        </div>
        
        <hr>

        <div id="join-form">
            <h2>Войти в комнату</h2>
            <input type="password" id="join-room-key" placeholder="Введите секретный ключ"/>
            <button id="join-btn">Войти</button>
        </div>
        
        <p id="auth-error" class="error"></p>
       </div>
       
       <div id="chat-screen" style="display: none;">
            <div id="chat-header">
                <span id="room-name"></span>
                <button id="leave-btn">Выйти из комнаты</button>
            </div>
            
            <div id="messages-list"></div>

            <form id="message-form">
                <input type="text" id="message-input" placeholder="Введите сообщение..." autocomplete="off"/>
                <button type="submit">Отправить</button>
            </form>    
        </div>

        <script src="app.js"></script>
</body>
</html>
